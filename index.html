<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPARK Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #08090f;
  --bg2: #0d1018;
  --surface: rgba(255,255,255,0.04);
  --surface-h: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.13);
  --gold: #e8a030;
  --gold-d: rgba(232,160,48,0.14);
  --teal: #20c9a0;
  --teal-d: rgba(32,201,160,0.12);
  --red: #ff6b6b;
  --red-d: rgba(255,107,107,0.12);
  --green: #4ade80;
  --green-d: rgba(74,222,128,0.12);
  --purple: #a78bfa;
  --blue: #60a5fa;
  --pink: #f472b6;
  --text: #dde2ee;
  --muted: #7a8394;
  --muted2: #4a5568;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{background:linear-gradient(180deg,rgba(232,160,48,.06) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#c07a10);border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:20px;color:#07080d;flex-shrink:0;box-shadow:0 4px 20px rgba(232,160,48,.35);letter-spacing:-1px}
.logo-text h1{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;line-height:1;letter-spacing:3px;color:var(--text)}
.logo-text p{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;text-transform:uppercase}
.hdr-btns{display:flex;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:15px}
.icon-btn:active{transform:scale(.93);background:var(--surface-h)}
.month-nav{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;height:40px;margin-bottom:12px}
.month-nav button{width:40px;height:40px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s;flex-shrink:0}
.month-nav button:active{color:var(--gold)}
.month-label{flex:1;text-align:center;font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--text);letter-spacing:.5px}

/* MAIN */
.main{padding:14px 14px 110px;max-width:600px;margin:0 auto}

/* SECTION */
.sec{margin-bottom:22px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;letter-spacing:.3px}
.sec-action{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;font-weight:500}

/* METRIC GRID */
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.m-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 14px;position:relative;overflow:hidden}
.m-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--gold));opacity:.6}
.m-card.wide{grid-column:span 2}
.m-card.gold{--ac:var(--gold)}
.m-card.teal{--ac:var(--teal)}
.m-card.red{--ac:var(--red)}
.m-card.green{--ac:var(--green)}
.m-card.purple{--ac:var(--purple)}
.m-label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.m-val{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-val.sm{font-size:22px}
.m-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}

/* TOGGLE */
.pills{display:flex;background:rgba(0,0,0,.35);border-radius:8px;padding:2px;gap:2px}
.pill{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .2s;border:none;background:none;font-family:'DM Sans',sans-serif}
.pill.active{background:var(--gold);color:#07080d}

/* CHART */
.chart-wrap{padding:12px;height:190px;position:relative}

/* PAYOUT CARDS */
.payout-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:9px;overflow:hidden;transition:border-color .2s}
.payout-card.expanded{border-color:var(--border2)}
.payout-hdr{padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer}
.payout-exp{margin-left:auto;color:var(--muted);font-size:11px;transition:transform .2s;flex-shrink:0}
.payout-card.expanded .payout-exp{transform:rotate(180deg)}
.payout-body{display:none;padding:0 14px 13px;border-top:1px solid var(--border)}
.payout-card.expanded .payout-body{display:block}
.payout-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:11px 0 10px}
.ps-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.ps-val{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;margin-top:2px}
.payout-actions{display:flex;gap:7px}

/* AVATARS */
.avatar{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0;font-family:'Cormorant Garamond',serif}
.prac-name{font-weight:500;font-size:14px}
.prac-sub{font-size:11px;color:var(--muted);margin-top:1px}
.prac-right{text-align:right}
.prac-pending-lbl{font-size:11px;margin-top:3px}
.has-p{color:var(--gold)}
.all-p{color:var(--teal)}

/* BTNS */
.btn{flex:1;padding:10px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--gold);color:#07080d}
.btn-ghost{background:var(--surface-h,rgba(255,255,255,.07));color:var(--text);border:1px solid var(--border)}
.btn-teal{background:var(--teal-d);color:var(--teal);border:1px solid rgba(32,201,160,.2)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.b-overdue{background:var(--red-d);color:var(--red)}
.b-paid{background:var(--green-d);color:var(--green)}
.b-pending{background:var(--gold-d);color:var(--gold)}
.b-yoga{background:rgba(96,165,250,.12);color:var(--blue)}
.b-breathwork{background:rgba(167,139,250,.12);color:var(--purple)}
.b-sound{background:var(--teal-d);color:var(--teal)}

/* SESSION ROWS */
.sr{position:relative;overflow:hidden}
.sr-inner{padding:11px 14px;display:flex;align-items:center;gap:11px;background:var(--surface);border-bottom:1px solid var(--border);position:relative;z-index:1;transition:transform .2s;cursor:pointer}
.sr:last-child .sr-inner{border-bottom:none}
.sr-bg{position:absolute;top:0;bottom:0;display:flex;align-items:center;padding:0 18px;font-size:12px;font-weight:700;letter-spacing:.4px;z-index:0}
.sr-bg-r{left:0;background:var(--green);color:#050;border-radius:0}
.sr-bg-l{right:0;background:var(--gold);color:#07080d}
.sr-date{background:var(--surface-h,rgba(255,255,255,.07));border:1px solid var(--border);border-radius:8px;padding:5px 8px;text-align:center;min-width:40px;flex-shrink:0}
.sr-day{font-size:16px;font-weight:700;line-height:1}
.sr-mon{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.sr-det{flex:1;min-width:0}
.sr-name{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-meta{font-size:11px;color:var(--muted);margin-top:2px}
.sr-amt{text-align:right;flex-shrink:0}
.sr-amt-val{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--gold)}
.sr-att{font-size:10px;color:var(--muted);margin-top:2px}

/* ANALYTICS */
.a-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.a-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px}
.a-item.full{grid-column:span 2}
.a-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.a-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
.a-sub{font-size:11px;color:var(--muted);margin-top:3px}
.dow-wrap{display:flex;align-items:flex-end;gap:5px;height:64px;margin-top:10px}
.dow-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.dow-track{flex:1;width:100%;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;display:flex;align-items:flex-end}
.dow-fill{width:100%;background:linear-gradient(180deg,var(--gold),rgba(232,160,48,.5));border-radius:3px;transition:height .5s ease}
.dow-lbl{font-size:9px;color:var(--muted)}

/* INSIGHTS */
.insight{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.insight-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.insight-title{font-size:13px;font-weight:600}
.insight-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}
.insight.warn{border-color:rgba(255,165,0,.2);background:rgba(255,165,0,.03)}
.insight.danger{border-color:rgba(255,107,107,.2);background:rgba(255,107,107,.03)}
.insight.success{border-color:rgba(74,222,128,.2);background:rgba(74,222,128,.03)}
.insight.info{border-color:rgba(32,201,160,.2);background:rgba(32,201,160,.03)}

/* FAB */
.fab-c{position:fixed;bottom:22px;right:18px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fab-menu{display:flex;flex-direction:column;gap:8px;align-items:flex-end;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .25s}
.fab-menu.open{opacity:1;pointer-events:all;transform:translateY(0)}
.fab-opt{display:flex;align-items:center;gap:9px;cursor:pointer}
.fab-opt-lbl{background:rgba(11,14,21,.95);border:1px solid var(--border);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;backdrop-filter:blur(12px);white-space:nowrap}
.fab-opt-btn{width:44px;height:44px;border-radius:13px;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.fab-opt-btn:active{transform:scale(.92)}
.fab-opt-btn.add-btn{background:var(--teal);color:#050}
.fab-opt-btn.pay-btn{background:var(--gold);color:#07080d}
.fab-main{width:56px;height:56px;border-radius:18px;background:var(--gold);border:none;color:#07080d;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(232,160,48,.42);transition:all .2s}
.fab-main:active{transform:scale(.94)}
.fab-plus{transition:transform .25s;line-height:1}
.fab-main.open .fab-plus{transform:rotate(45deg)}

/* MODALS */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
.modal.open{opacity:1;pointer-events:all}
.modal-sheet{background:#0c0f18;border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:18px 18px 44px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.34,1.56,.64,1)}
.modal.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:13px}
.fl{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.4px;margin-bottom:5px;display:block;text-transform:uppercase}
.fi,.fs{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.fi:focus,.fs:focus{border-color:var(--gold)}
.fs option{background:#0c0f18}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.comm-prev{background:var(--gold-d);border:1px solid rgba(232,160,48,.2);border-radius:10px;padding:10px 13px;margin-bottom:13px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.cp-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.cp-val{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold);margin-top:2px}

/* RECEIPT */
.receipt-body{background:#fff;color:#111;border-radius:12px;padding:22px;font-family:'DM Sans',sans-serif;margin-bottom:14px}
.r-brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;letter-spacing:2px;color:#111}
.r-sub{font-size:11px;color:#666;margin-bottom:14px;margin-top:2px}
.r-hr{border:none;border-top:1px solid #eee;margin:10px 0}
.r-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
.r-total{background:#f5f5f5;border-radius:8px;padding:11px;margin-top:10px;display:flex;justify-content:space-between;font-weight:700;font-size:15px}

/* TOAST */
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(12,15,22,.97);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;z-index:500;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;backdrop-filter:blur(20px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{text-align:center;padding:28px 14px;color:var(--muted)}
.empty-ico{font-size:30px;margin-bottom:7px;opacity:.5}
.empty-txt{font-size:13px}

/* SCROLLBAR */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-mark">S</div>
      <div class="logo-text">
        <h1>SPARK</h1>
        <p>Wellness Studio</p>
      </div>
    </div>
    <div class="hdr-btns">
      <button class="icon-btn" onclick="exportCSV()" title="Export CSV">⬇</button>
      <button class="icon-btn" onclick="resetData()" title="Reset data" style="font-size:12px">↺</button>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="shiftMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button onclick="shiftMonth(1)">›</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- METRICS -->
  <div class="sec">
    <div class="m-grid" id="metricsGrid"></div>
  </div>

  <!-- REVENUE BY PRACTITIONER -->
  <div class="sec">
    <div class="sec-hdr">
      <div class="sec-title">Revenue by Practitioner</div>
      <div class="pills">
        <button class="pill active" onclick="setPracTab('month',this)">Month</button>
        <button class="pill" onclick="setPracTab('all',this)">All Time</button>
      </div>
    </div>
    <div class="card"><div class="chart-wrap"><canvas id="pracChart"></canvas></div></div>
  </div>

  <!-- PAYOUT ENGINE -->
  <div class="sec">
    <div class="sec-hdr">
      <div class="sec-title">Payout Engine</div>
      <button class="sec-action" onclick="markAllPaid()">Mark All Paid</button>
    </div>
    <div id="payoutEngine"></div>
  </div>

  <!-- UNPAID SESSIONS -->
  <div class="sec">
    <div class="sec-hdr">
      <div class="sec-title">Unpaid Sessions</div>
      <span class="badge b-pending" id="unpaidBadge">0</span>
    </div>
    <div class="card" id="unpaidList"></div>
  </div>

  <!-- ANALYTICS -->
  <div class="sec">
    <div class="sec-hdr"><div class="sec-title">Analytics</div></div>
    <div class="a-grid" id="aGrid"></div>
    <div class="a-item full card" style="margin-top:0;border-radius:14px">
      <div class="a-lbl">Revenue by Day of Week</div>
      <div class="dow-wrap" id="dowBars"></div>
    </div>
  </div>

  <!-- AI INSIGHTS -->
  <div class="sec">
    <div class="sec-hdr"><div class="sec-title">🧠 AI Insights</div></div>
    <div id="insightsPanel"></div>
  </div>

</div>

<!-- FAB -->
<div class="fab-c">
  <div class="fab-menu" id="fabMenu">
    <div class="fab-opt" onclick="openM('addModal')">
      <div class="fab-opt-lbl">Add Session</div>
      <button class="fab-opt-btn add-btn">＋</button>
    </div>
    <div class="fab-opt" onclick="openM('payModal')">
      <div class="fab-opt-lbl">Record Payment</div>
      <button class="fab-opt-btn pay-btn">₭</button>
    </div>
  </div>
  <button class="fab-main" id="fabMain" onclick="toggleFAB()">
    <span class="fab-plus">＋</span>
  </button>
</div>

<!-- ADD SESSION MODAL -->
<div class="modal" id="addModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Session</div>
    <div class="fr">
      <div class="fg"><label class="fl">Date</label><input class="fi" type="date" id="f-date"></div>
      <div class="fg"><label class="fl">Type</label>
        <select class="fs" id="f-type" onchange="calcPrev()">
          <option>Yoga</option><option>Breathwork</option><option>Sound Meditation</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="fl">Session Name</label><input class="fi" type="text" id="f-name" placeholder="e.g. Morning Hatha Flow"></div>
    <div class="fg"><label class="fl">Practitioner</label>
      <input class="fi" type="text" id="f-prac" list="pracList" placeholder="Practitioner name">
      <datalist id="pracList"></datalist>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Attendees</label><input class="fi" type="number" id="f-att" placeholder="0" min="0" oninput="calcPrev()"></div>
      <div class="fg"><label class="fl">Price / Person (KES)</label><input class="fi" type="number" id="f-price" placeholder="999" min="0" oninput="calcPrev()"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Studio % (e.g. 40)</label><input class="fi" type="number" id="f-spct" value="40" min="0" max="100" oninput="calcPrev()"></div>
      <div class="fg"><label class="fl">Status</label>
        <select class="fs" id="f-status"><option value="Pending">Pending</option><option value="Paid">Paid</option></select>
      </div>
    </div>
    <div class="comm-prev">
      <div><div class="cp-lbl">Total Rev</div><div class="cp-val" id="pv-total">KES 0</div></div>
      <div><div class="cp-lbl">Studio</div><div class="cp-val" id="pv-studio">KES 0</div></div>
      <div><div class="cp-lbl">Practitioner</div><div class="cp-val" id="pv-prac">KES 0</div></div>
    </div>
    <div class="fg" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="f-pack" style="width:16px;height:16px;accent-color:var(--gold)">
      <label for="f-pack" class="fl" style="margin:0;cursor:pointer">Pack Session (deferred revenue)</label>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="submitSession()">Save Session</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="closeM('addModal')">Cancel</button>
  </div>
</div>

<!-- RECORD PAYMENT MODAL -->
<div class="modal" id="payModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Record Payment</div>
    <div class="fg"><label class="fl">Practitioner</label>

  {id:'s10',date:'2026-04-25',sessionName:'Deep Sound Immersion',practitioner:'Zara',type:'Sound Meditation',attendees:2,pricePerPerson:1200,totalRevenue:2400,studioRevenue:960,practitionerRevenue:1440,studioCommission:.40,practitionerCommission:.60,payoutTo:'Practitioner',status:'Pending',pack:false,month:'2026-04'},

  {id:'s13',date:'2026-03-19',sessionName:'Sound Bath',practitioner:'Zara',type:'Sound Meditation',attendees:8,pricePerPerson:1200,totalRevenue:9600,studioRevenue:3840,practitionerRevenue:5760,studioCommission:.40,practitionerCommission:.60,payoutTo:'Practitioner',status:'Paid',pack:false,month:'2026-03'},
  {id:'s14',date:'2026-03-26',sessionName:'Yin Yoga Deep Rest',practitioner:'Danny',type:'Yoga',attendees:12,pricePerPerson:999,totalRevenue:11988,studioRevenue:4795.20,practitionerRevenue:7192.80,studioCommission:.40,practitionerCommission:.60,payoutTo:'Practitioner',status:'Paid',pack:false,month:'2026-03'},
  {id:'s15',date:'2026-03-08',sessionName:'Pack – 5-Class Yoga',practitioner:'Danny',type:'Yoga',attendees:5,pricePerPerson:850,totalRevenue:4250,studioRevenue:1700,practitionerRevenue:2550,studioCommission:.40,practitionerCommission:.60,payoutTo:'Practitioner',status:'Paid',pack:true,month:'2026-03'},
];

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let sessions = [];
let selMonth = '2026-04';
let pracTab = 'month';
let chartInst = null;
let fabOpen = false;

// ──────────────────────────────────────────────
//  STORAGE
// ──────────────────────────────────────────────
function load() {
  try {
    const d = localStorage.getItem('spark_v2');
    sessions = d ? JSON.parse(d) : [...DEFAULTS];
  } catch(e) { sessions = [...DEFAULTS]; }
}
function save() {
  try { localStorage.setItem('spark_v2', JSON.stringify(sessions)); } catch(e) {}
}
function resetData() {
  if (!confirm('Reset to sample data?')) return;
  sessions = [...DEFAULTS];
  selMonth = '2026-04';
  save(); render(); toast('Reset to sample data ✓');
}

// ──────────────────────────────────────────────
//  HELPERS
// ──────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e6) return 'KES '+(n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return 'KES '+(n/1e3).toFixed(1)+'K';
  return 'KES '+Math.round(n).toLocaleString();
}
function fmtFull(n) { return 'KES '+Math.round(n).toLocaleString(); }
function monthName(m) {
  if (!m) return '';
  const [y,mo] = m.split('-');
  return new Date(+y,+mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function months() { return [...new Set(sessions.map(s=>s.month))].sort().reverse(); }
function filtered() { return sessions.filter(s=>s.month===selMonth); }
function isOverdue(s) {
  if (s.status!=='Pending') return false;
  return (Date.now()-new Date(s.date).getTime())/864e5 > 7;
}

const PCOLORS = ['#e8a030','#20c9a0','#a78bfa','#60a5fa','#f472b6','#fb923c'];

// ──────────────────────────────────────────────
//  CALCULATIONS  (single source of truth)
// ──────────────────────────────────────────────
function calcMetrics(f) {
  return {
    totalRevenue: f.reduce((a,s)=>a+s.totalRevenue,0),
    sessionsHeld: f.length,
    studioIncome: f.reduce((a,s)=>a+s.studioRevenue,0),
    outstanding:  f.filter(s=>s.status==='Pending').reduce((a,s)=>a+s.practitionerRevenue,0),
    paidOut:      f.filter(s=>s.status==='Paid').reduce((a,s)=>a+s.practitionerRevenue,0),
    packRevenue:  f.filter(s=>s.pack).reduce((a,s)=>a+s.totalRevenue,0),
  };
}

function byPrac(arr) {
  const map = {};
  arr.forEach(s => {
    if (!map[s.practitioner]) map[s.practitioner]={name:s.practitioner,total:0,studioRev:0,pracRev:0,pending:0,paid:0,sessions:0,types:new Set(),pendingDates:[]};
    const p = map[s.practitioner];
    p.total+=s.totalRevenue; p.studioRev+=s.studioRevenue; p.pracRev+=s.practitionerRevenue; p.sessions++;
    p.types.add(s.type);
    if(s.status==='Pending'){p.pending+=s.practitionerRevenue;p.pendingDates.push(s.date);}
    else p.paid+=s.practitionerRevenue;
  });
  return Object.values(map).sort((a,b)=>b.total-a.total);
}

function calcAnalytics(f) {
  const avgRevenue = f.length ? f.reduce((a,s)=>a+s.totalRevenue,0)/f.length : 0;
  const avgAttendees = f.length ? f.reduce((a,s)=>a+s.attendees,0)/f.length : 0;
  const typeMap = {};
  f.forEach(s=>{ typeMap[s.type]=(typeMap[s.type]||0)+s.totalRevenue; });
  const bestType = Object.entries(typeMap).sort((a,b)=>b[1]-a[1])[0];
  const dow = {Mon:0,Tue:0,Wed:0,Thu:0,Fri:0,Sat:0,Sun:0};
  const dLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  f.forEach(s=>{ const k=dLabels[new Date(s.date).getDay()]; if(dow[k]!==undefined)dow[k]+=s.totalRevenue; });
  return {avgRevenue,avgAttendees,bestType,dow,totalAttendees:f.reduce((a,s)=>a+s.attendees,0)};
}

function getInsights(f) {
  const ins = [];
  if (!f.length) return [{type:'info',icon:'📭',title:'No Sessions',desc:'No data for this month yet. Add your first session to get started.'}];

  const total = f.reduce((a,s)=>a+s.totalRevenue,0);
  const grouped = byPrac(f);

  // concentration risk
  if (grouped.length > 0) {
    const pct = total>0 ? (grouped[0].total/total)*100 : 0;
    if (pct>40) ins.push({type:'warn',icon:'⚠️',title:'Revenue Concentration Risk',desc:`${grouped[0].name} accounts for ${pct.toFixed(0)}% of revenue. Diversify your practitioner roster.`});
  }

  // avg attendance
  const avg = f.reduce((a,s)=>a+s.attendees,0)/f.length;
  if (avg < 5) ins.push({type:'danger',icon:'📉',title:'Low Utilization',desc:`Avg attendance is ${avg.toFixed(1)}/session. Target 8+ for healthy margins.`});
  else if (avg >= 9) ins.push({type:'success',icon:'🚀',title:'Strong Attendance',desc:`${avg.toFixed(1)} avg attendees/session. Excellent studio utilization!`});

  // growth vs prev month
  const ms = months(); const ci = ms.indexOf(selMonth);
  if (ci < ms.length-1) {
    const prev = sessions.filter(s=>s.month===ms[ci+1]).reduce((a,s)=>a+s.totalRevenue,0);
    if (prev>0 && total>prev) {
      const g = ((total-prev)/prev*100).toFixed(0);
      ins.push({type:'success',icon:'📈',title:`+${g}% Revenue Growth`,desc:`Up from ${fmtFull(prev)} last month to ${fmtFull(total)} this month.`});
    } else if (prev>0 && total<prev) {
      const d = ((prev-total)/prev*100).toFixed(0);
      ins.push({type:'danger',icon:'📊',title:`Revenue Down ${d}%`,desc:`Dropped from ${fmtFull(prev)} to ${fmtFull(total)}. Review session frequency or pricing.`});
    }
  }

  // overdue
  const od = f.filter(s=>isOverdue(s));
  if (od.length) ins.push({type:'danger',icon:'🔔',title:`${od.length} Overdue Payout${od.length>1?'s':''}`,desc:`Payments pending >7 days. Settle promptly to maintain practitioner trust.`});

  if (!ins.length) ins.push({type:'info',icon:'✅',title:'All Clear',desc:'No issues detected. Studio is running smoothly.'});
  return ins;
}

// ──────────────────────────────────────────────
//  RENDER
// ──────────────────────────────────────────────
function render() {
  document.getElementById('monthLabel').textContent = monthName(selMonth);

  renderPayouts(f);

}

function renderPracChart() {
  const arr = pracTab==='month' ? filtered() : sessions;
  const grouped = byPrac(arr);
  const ctx = document.getElementById('pracChart').getContext('2d');
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: grouped.map(p=>p.name),
      datasets: [{
        data: grouped.map(p=>p.total),
        backgroundColor: grouped.map((_,i)=>PCOLORS[i%PCOLORS.length]+'28'),
        borderColor: grouped.map((_,i)=>PCOLORS[i%PCOLORS.length]),
        borderWidth: 2,
        borderRadius: 8,
      },{
        data: grouped.map(p=>p.studioRev),
        label: 'Studio',
        backgroundColor: grouped.map((_,i)=>PCOLORS[i%PCOLORS.length]+'18'),
        borderColor: grouped.map((_,i)=>PCOLORS[i%PCOLORS.length]+'88'),
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display:false},
        tooltip: { callbacks: { label: ctx => 'KES '+ctx.raw.toLocaleString() } }
      },
      scales: {
        x: { grid:{display:false}, ticks:{color:'#7a8394',font:{size:11,family:'DM Sans'}} },
        y: { grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#7a8394',font:{size:10},callback:v=>'K'+(v/1000).toFixed(0)} }
      }
    }
  });
}

function renderPayouts(f) {
  const grouped = byPrac(f);
  const el = document.getElementById('payoutEngine');
  if (!grouped.length) { el.innerHTML=`<div class="empty"><div class="empty-ico">💸</div><div class="empty-txt">No sessions this month</div></div>`; return; }

  el.innerHTML = grouped.map((p,i) => {
    const c = PCOLORS[i%PCOLORS.length];
    const ini = p.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const types = [...p.types].join(', ');
    const od = f.filter(s=>s.practitioner===p.name&&isOverdue(s)).length;
    const id = 'pc-'+p.name.replace(/\s+/g,'_');
    return `
      <div class="payout-card" id="${id}">
        <div class="payout-hdr" onclick="togglePayout('${id}')">
          <div class="avatar" style="background:${c}22;color:${c}">${ini}</div>
          <div style="flex:1;min-width:0">
            <div class="prac-name">${p.name}</div>
            <div class="prac-sub">${types} · ${p.sessions} session${p.sessions>1?'s':''}</div>
          </div>
          <div class="prac-right" style="margin-right:4px">
            ${od?`<span class="badge b-overdue">⏰ Overdue</span>`:''}
            <div class="prac-pending-lbl ${p.pending>0?'has-p':'all-p'}" style="margin-top:${od?4:0}px">
              ${p.pending>0 ? fmt(p.pending)+' due' : '✓ Settled'}
            </div>
          </div>
          <div class="payout-exp">▼</div>
        </div>
        <div class="payout-body">
          <div class="payout-stats">
            <div><div class="ps-label">Earned</div><div class="ps-val" style="color:${c}">${fmt(p.pracRev)}</div></div>
            <div><div class="ps-label">Pending</div><div class="ps-val" style="color:var(--gold)">${fmt(p.pending)}</div></div>
            <div><div class="ps-label">Paid</div><div class="ps-val" style="color:var(--green)">${fmt(p.paid)}</div></div>
          </div>
          <div class="payout-actions">
            ${p.pending>0
              ? `<button class="btn btn-primary" onclick="markPracPaid('${p.name}')">✓ Mark Paid</button>`
              : `<button class="btn btn-ghost" disabled>✓ All Paid</button>`}
            <button class="btn btn-ghost" onclick="openReceipt('${p.name}')">🧾 Receipt</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderUnpaid(f) {
  const unpaid = f.filter(s=>s.status==='Pending').sort((a,b)=>new Date(a.date)-new Date(b.date));
  document.getElementById('unpaidBadge').textContent = unpaid.length;
  const el = document.getElementById('unpaidList');
  if (!unpaid.length) { el.innerHTML=`<div class="empty"><div class="empty-ico">🎉</div><div class="empty-txt">All sessions settled!</div></div>`; return; }

  el.innerHTML = unpaid.map(s => {
    const d = new Date(s.date);
    const day = d.getDate(), mon = d.toLocaleDateString('en',{month:'short'});
    const tc = s.type==='Yoga'?'b-yoga':s.type==='Breathwork'?'b-breathwork':'b-sound';

      <div class="sr" id="sr-${s.id}">

        <div class="sr-bg sr-bg-l">✎ Edit</div>

          <div class="sr-amt">

            <div class="sr-att">${s.attendees} pax</div>

  }).join('');

  unpaid.forEach(s => {
    const row = document.getElementById('sr-'+s.id);
    if (row) attachSwipe(row, ()=>markSessionPaid(s.id), ()=>toast('Edit coming soon'));

function renderAnalytics(f) {
  const a = calcAnalytics(f);
  document.getElementById('aGrid').innerHTML = `
    <div class="a-item">
      <div class="a-lbl">Avg Rev / Session</div>
      <div class="a-val">${fmt(a.avgRevenue)}</div>
      <div class="a-sub">Per session average</div>
    </div>
    <div class="a-item">
      <div class="a-lbl">Avg Attendance</div>

function togglePayout(id) { document.getElementById(id).classList.toggle('expanded'); }

function markPracPaid(name) {
  sessions = sessions.map(s => s.practitioner===name && s.month===selMonth && s.status==='Pending' ? {...s,status:'Paid'} : s);
  save(); render(); toast(`${name} marked as paid ✓`);
}

function markSessionPaid(id) {
  sessions = sessions.map(s => s.id===id ? {...s,status:'Paid'} : s);
  save(); render(); toast('Session marked as paid ✓');
}

function markAllPaid() {
  const pending = filtered().filter(s=>s.status==='Pending');
  if (!pending.length) { toast('No pending sessions'); return; }
  if (!confirm(`Mark all ${pending.length} pending sessions as paid?`)) return;
  sessions = sessions.map(s => s.month===selMonth && s.status==='Pending' ? {...s,status:'Paid'} : s);
  save(); render(); toast('All sessions marked as paid ✓');
}

function shiftMonth(dir) {
  const ms = months();
  const i = ms.indexOf(selMonth);
  const ni = i + dir;
  if (ni>=0 && ni<ms.length) { selMonth=ms[ni]; render(); }
  else toast(dir<0?'No older data':'No newer data');
}

// ──────────────────────────────────────────────
//  ADD SESSION
// ──────────────────────────────────────────────
function calcPrev() {
  const att=parseFloat(document.getElementById('f-att').value)||0;
  const price=parseFloat(document.getElementById('f-price').value)||0;
  const spct=parseFloat(document.getElementById('f-spct').value)||40;
  const total=att*price, studio=total*(spct/100), prac=total-studio;
  document.getElementById('pv-total').textContent=fmtFull(total);
  document.getElementById('pv-studio').textContent=fmtFull(studio);
  document.getElementById('pv-prac').textContent=fmtFull(prac);
}

function submitSession() {
  const date=document.getElementById('f-date').value;
  const type=document.getElementById('f-type').value;
  const name=document.getElementById('f-name').value.trim();
  const prac=document.getElementById('f-prac').value.trim();
  const att=parseInt(document.getElementById('f-att').value);
  const price=parseFloat(document.getElementById('f-price').value);
  const spct=parseFloat(document.getElementById('f-spct').value)||40;
  const status=document.getElementById('f-status').value;
  const pack=document.getElementById('f-pack').checked;

  if (!date||!name||!prac||!att||!price) { toast('Fill all required fields'); return; }

  const total=att*price, studioRev=total*(spct/100), pracRev=total-studioRev;
  const month=date.slice(0,7);

  sessions.push({
    id:'s'+Date.now(), date, sessionName:name, practitioner:prac, type,
    attendees:att, pricePerPerson:price, totalRevenue:total,
    studioRevenue:studioRev, practitionerRevenue:pracRev,
    studioCommission:spct/100, practitionerCommission:(100-spct)/100,
    payoutTo:'Practitioner', status, pack, month
  });

  selMonth=month;
  save(); closeM('addModal'); render(); toast('Session added ✓');
}

// ──────────────────────────────────────────────
//  RECEIPT
// ──────────────────────────────────────────────
function openReceipt(name) {
  const f = filtered();
  const paid = f.filter(s=>s.practitioner===name&&s.status==='Paid');
  const pend = f.filter(s=>s.practitioner===name&&s.status==='Pending');
  const all  = [...paid,...pend];
  if (!all.length) { toast('No sessions for this practitioner'); return; }

  const totalPaid = paid.reduce((a,s)=>a+s.practitionerRevenue,0);
  const totalPend = pend.reduce((a,s)=>a+s.practitionerRevenue,0);

  document.getElementById('rcptContent').innerHTML = `
    <div class="receipt-body">
      <div class="r-brand">SPARK</div>
      <div class="r-sub">Wellness Studio · Jaffery Sports Club, Lavington, Nairobi · Payment Receipt</div>
      <hr class="r-hr">
      <div class="r-row"><span>Practitioner</span><strong>${name}</strong></div>
      <div class="r-row"><span>Period</span><strong>${monthName(selMonth)}</strong></div>
      <div class="r-row"><span>Sessions</span><strong>${all.length}</strong></div>
      <hr class="r-hr">
      ${paid.map(s=>`<div class="r-row"><span>${s.date} – ${s.sessionName} (${s.attendees} pax)</span><strong>KES ${Math.round(s.practitionerRevenue).toLocaleString()}</strong></div>`).join('')}
      ${pend.length?`<hr class="r-hr"><div class="r-row" style="color:#999"><span><em>Pending</em></span></div>`:''}
      ${pend.map(s=>`<div class="r-row" style="color:#999"><span>${s.date} – ${s.sessionName}</span><span>KES ${Math.round(s.practitionerRevenue).toLocaleString()}</span></div>`).join('')}
      <div class="r-total"><span>Total Paid</span><span>KES ${Math.round(totalPaid).toLocaleString()}</span></div>
      ${totalPend>0?`<div style="text-align:right;font-size:11px;color:#999;margin-top:5px">Pending: KES ${Math.round(totalPend).toLocaleString()}</div>`:''}
      <div style="text-align:center;font-size:10px;color:#aaa;margin-top:14px;border-top:1px solid #eee;padding-top:10px">
        Generated on ${new Date().toLocaleDateString('en-KE',{dateStyle:'full'})}
      </div>
    </div>`;
  openM('rcptModal');
}

// ──────────────────────────────────────────────
//  RECORD PAYMENT MODAL
// ──────────────────────────────────────────────
function initPayModal() {
  const f = filtered();
  const pracs = [...new Set(f.filter(s=>s.status==='Pending').map(s=>s.practitioner))];
  const sel = document.getElementById('p-prac');
  sel.innerHTML = pracs.length ? pracs.map(p=>`<option value="${p}">${p}</option>`).join('') : '<option value="">No pending payouts</option>';
  updatePayBal();
}

function updatePayBal() {
  const name = document.getElementById('p-prac').value;
  const bal = filtered().filter(s=>s.practitioner===name&&s.status==='Pending').reduce((a,s)=>a+s.practitionerRevenue,0);
  document.getElementById('p-bal').textContent = fmtFull(bal);
}

function submitPayment() {
  const name = document.getElementById('p-prac').value;
  if (!name) { toast('Select a practitioner'); return; }
  markPracPaid(name);
  openReceipt(name);
}

// ──────────────────────────────────────────────
//  CSV EXPORT
// ──────────────────────────────────────────────
function exportCSV() {
  const f = filtered();
  if (!f.length) { toast('No sessions to export'); return; }
  const h = ['Date','Session','Practitioner','Type','Attendees','Price/Person','Total Revenue','Studio Revenue','Practitioner Revenue','Studio %','Status','Pack'];
  const rows = f.map(s=>[s.date,`"${s.sessionName}"`,s.practitioner,s.type,s.attendees,s.pricePerPerson,s.totalRevenue,s.studioRevenue.toFixed(2),s.practitionerRevenue.toFixed(2),(s.studioCommission*100).toFixed(0)+'%',s.status,s.pack?'Yes':'No']);
  const csv = [h,...rows].map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `SPARK_${selMonth}.csv`;
  a.click();
  toast('CSV exported ✓');
}

// ──────────────────────────────────────────────
//  SWIPE GESTURES
// ──────────────────────────────────────────────
function attachSwipe(el, onRight, onLeft) {
  const inner = el.querySelector('.sr-inner');
  let sx=0, cx=0, drag=false;
  const thresh = 75;
  el.addEventListener('touchstart', e=>{sx=e.touches[0].clientX; drag=true; inner.style.transition='none';},{passive:true});
  el.addEventListener('touchmove', e=>{
    if(!drag)return; cx=e.touches[0].clientX-sx;
    inner.style.transform=`translateX(${Math.max(-thresh*1.6,Math.min(thresh*1.6,cx))}px)`;
  },{passive:true});
  el.addEventListener('touchend', ()=>{
    drag=false; inner.style.transition='transform .28s';
    if(cx>thresh){inner.style.transform='translateX(110%)';setTimeout(()=>onRight(),220);}
    else if(cx<-thresh){inner.style.transform='translateX(-110%)';setTimeout(()=>onLeft(),220);}
    else inner.style.transform='translateX(0)';
    cx=0;
  });
}

// ──────────────────────────────────────────────
//  MODALS
// ──────────────────────────────────────────────
function openM(id) {
  closeFAB();
  document.getElementById(id).classList.add('open');
  if(id==='addModal'){
    document.getElementById('f-date').value=new Date().toISOString().split('T')[0];
    calcPrev();
  }
  if(id==='payModal') initPayModal();
  document.getElementById(id).addEventListener('click',function h(e){if(e.target===this){closeM(id);this.removeEventListener('click',h);}});
}
function closeM(id){document.getElementById(id).classList.remove('open');}

// ──────────────────────────────────────────────
//  FAB
// ──────────────────────────────────────────────
function toggleFAB(){
  fabOpen=!fabOpen;
  document.getElementById('fabMenu').classList.toggle('open',fabOpen);
  document.getElementById('fabMain').classList.toggle('open',fabOpen);
}
function closeFAB(){
  fabOpen=false;
  document.getElementById('fabMenu').classList.remove('open');
  document.getElementById('fabMain').classList.remove('open');
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.fab-c')) closeFAB();
});

// ──────────────────────────────────────────────
//  TOAST
// ──────────────────────────────────────────────
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

// ──────────────────────────────────────────────
//  DATALIST
// ──────────────────────────────────────────────
function updatePracList() {
  const names=[...new Set(sessions.map(s=>s.practitioner))];
  document.getElementById('pracList').innerHTML=names.map(n=>`<option value="${n}">`).join('');
}

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
load();
render();
</script>
